# Stage 4 SAE training config: BatchTopK mainline. CLI flags override these values.

# ----- training placement -----
train_gpu: 6            # Physical GPU id used for SAE training; train_sae.py sets CUDA_VISIBLE_DEVICES to this id.

# ----- output / logging / checkpoints -----
output_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/output
log_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/logs
log_file: null
checkpoint_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/checkpoints
ckpt_every: 1000

# ----- W&B -----
wandb: true
wandb_project: chem_sae
wandb_entity: null
wandb_run_name: null

# ----- BatchTopK SAE architecture / optimization -----
arch: batchtopk         # Batch-level TopK SAE; k directly fixes average active latents.
layer: 26
expansion: 16           # d_sae = expansion * d_in; ChemDFM d_in=5120 so 16x gives 81920 latents.
k: 32                   # Target L0 / active latents per token for BatchTopK.
init: asi
lr: 1.0e-4
total_steps: 30000
batch_size: 4096
train_block_rows: 32768
decoder_init_norm: 0.1
dead_window: 2000000
holdout_rows: 50000
log_every: 50
run_name: null

# ----- periodic Delta LM loss eval -----
eval: true
eval_gpu: 7
eval_per_step: 500
eval_batch_size: 2
eval_n_eval_seqs: 32
eval_max_length: 128
eval_model: chemdfm
eval_timeout_sec: 3600
eval_poll_interval: 5.0
eval_keep_checkpoints: false
