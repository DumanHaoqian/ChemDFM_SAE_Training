# Stage 4 SAE training config: JumpReLU baseline. CLI flags override these values.
# JumpReLU is NOT TopK: k does not enforce L0. Sparsity is controlled by the
# JumpReLU L0 penalty / threshold dynamics, so compare L0 explicitly in W&B.

# ----- training placement -----
train_gpu: 6            # Physical GPU id used for SAE training; train_sae.py sets CUDA_VISIBLE_DEVICES to this id.

# ----- output / logging / checkpoints -----
output_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/output
log_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/logs
log_file: null
checkpoint_dir: /home/haoqian/Data/Graph/SAERAG_Stage4/checkpoints
ckpt_every: 1000

# ----- W&B -----
wandb: true
wandb_project: chem_sae
wandb_entity: null
wandb_run_name: null

# ----- JumpReLU SAE architecture / optimization -----
arch: jumprelu          # JumpReLU baseline; dense unless L0 penalty is strong enough.
layer: 26
expansion: 16
k: 32                   # Kept only for shared CLI/run metadata; does NOT enforce JumpReLU L0.
init: asi
lr: 1.0e-4
total_steps: 30000
batch_size: 4096
train_block_rows: 32768
decoder_init_norm: 0.1
dead_window: 2000000
holdout_rows: 50000
log_every: 50
run_name: null

# JumpReLU-specific sparsity knobs. Higher l0_coefficient forces lower L0,
# usually at the cost of reconstruction fidelity / Delta LM loss.
jumprelu_l0_coefficient: 100.0
jumprelu_l0_warm_up_steps: 1000

# ----- periodic Delta LM loss eval -----
eval: true
eval_gpu: 7
eval_per_step: 500
eval_batch_size: 2
eval_n_eval_seqs: 32
eval_max_length: 128
eval_model: chemdfm
eval_timeout_sec: 3600
eval_startup_timeout_sec: 600
eval_request_timeout_sec: 1800
eval_poll_interval: 5.0
eval_keep_checkpoints: false
eval_texts_path: null
overwrite: false
